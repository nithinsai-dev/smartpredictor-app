<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPredictor App</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .back {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            display: none;
        }
        #resetBtn {
            width: 100%;
            padding: 12px;
            background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            color:white;
        }
        #resetBtn:hover {
            background-color: #667eea;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" style="display:block; text-align:center; margin-bottom:20px;">← Back to Home</a>

        <h1>🌾 Seed Variety Predictor</h1>
        <p style="text-align:center; color:#777;">Enter seed measurements to predict the wheat variety</p>

        <div class="form-group">
            <label>Area (A)</label>
            <input type="number" step="0.001" id="A" placeholder="e.g. 15.26">
        </div>
        <div class="form-group">
            <label>Perimeter (P)</label>
            <input type="number" step="0.001" id="P" placeholder="e.g. 14.84">
        </div>
        <div class="form-group">
            <label>Compactness (C)</label>
            <input type="number" step="0.001" id="C" placeholder="e.g. 0.871">
        </div>
        <div class="form-group">
            <label>Kernel Length (LK)</label>
            <input type="number" step="0.001" id="LK" placeholder="e.g. 5.763">
        </div>
        <div class="form-group">
            <label>Kernel Width (WK)</label>
            <input type="number" step="0.001" id="WK" placeholder="e.g. 3.312">
        </div>
        <div class="form-group">
            <label>Asymmetry Coefficient (A_Coef)</label>
            <input type="number" step="0.001" id="A_Coef" placeholder="e.g. 2.221">
        </div>
        <div class="form-group">
            <label>Kernel Groove Length (LKG)</label>
            <input type="number" step="0.001" id="LKG" placeholder="e.g. 5.220">
        </div>

        <button id="predictBtn">🔍 Predict Variety</button>

        <div id="result"></div>
        <button id="resetBtn" type="button">🔄 Reset</button>
    </div>



    <script>
        $("#predictBtn").click(function() {
            $("#predictBtn").text("⏳ Predicting...").prop("disabled", true);
            var data = {
                A: $("#A").val(),
                P: $("#P").val(),
                C: $("#C").val(),
                LK: $("#LK").val(),
                WK: $("#WK").val(),
                A_Coef: $("#A_Coef").val(),
                LKG: $("#LKG").val()
            };

            $.ajax({
                url: "/predict_seeds",
                type: "POST",
                data: data,
                success: function(response) {
                    console.log(response)
                    $("#result").text("🌾 Predicted Variety: " + response.prediction);
                    $("#result").show();
                    $("#predictBtn").text("🔍 Predict Variety").prop("disabled", false);
                },
                error: function() {
                    $("#result").html("❌ Something went wrong!");
                    $("#result").show();
                    $("#predictBtn").text("🔍 Predict Variety").prop("disabled", false);
                }
            });
        });
        $("#resetBtn").click(function() {
                $("input").val("");
                $("#result").hide();
                $("#predictBtn").prop("disabled", false);
        });
    </script>

</body>
</html>
