<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPredictor App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            text-align: center;
            font-size: 1.1rem;
        }
        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .card .emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .card p {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .card a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
        }
        .card a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>🌿 SmartPredictor App</h1>
    <p>Choose a model to get started!</p>

    <div class="cards">
        <div class="card">
            <div class="emoji">🌾</div>
            <h2>Seed Variety Predictor</h2>
            <p>Predict the variety of wheat seed based on physical measurements</p>
            <a href="/seeds">Open Predictor</a>
        </div>
        <div class="card">
            <div class="emoji">🌱</div>
            <h2>Crop Recommendation</h2>
            <p>Get the best crop recommendation based on soil and weather conditions</p>
            <a href="/crop">Open Predictor</a>
        </div>
    </div>
</body>
</html>
