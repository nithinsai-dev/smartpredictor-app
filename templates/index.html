<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPredictor App</title>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #4CAF50;
            display: none;
        }
    </style>
</head>
<body>

    <h1>🌾 Seed Variety Predictor</h1>
    <p style="text-align:center; color:#777;">Enter seed measurements to predict the wheat variety</p>

    <div class="form-group">
        <label>Area (A)</label>
        <input type="number" step="0.001" id="A" placeholder="e.g. 15.26">
    </div>
    <div class="form-group">
        <label>Perimeter (P)</label>
        <input type="number" step="0.001" id="P" placeholder="e.g. 14.84">
    </div>
    <div class="form-group">
        <label>Compactness (C)</label>
        <input type="number" step="0.001" id="C" placeholder="e.g. 0.871">
    </div>
    <div class="form-group">
        <label>Kernel Length (LK)</label>
        <input type="number" step="0.001" id="LK" placeholder="e.g. 5.763">
    </div>
    <div class="form-group">
        <label>Kernel Width (WK)</label>
        <input type="number" step="0.001" id="WK" placeholder="e.g. 3.312">
    </div>
    <div class="form-group">
        <label>Asymmetry Coefficient (A_Coef)</label>
        <input type="number" step="0.001" id="A_Coef" placeholder="e.g. 2.221">
    </div>
    <div class="form-group">
        <label>Kernel Groove Length (LKG)</label>
        <input type="number" step="0.001" id="LKG" placeholder="e.g. 5.220">
    </div>

    <button id="predictBtn">🔍 Predict Variety</button>

    <div id="result"></div>

    <script>
        $("#predictBtn").click(function() {
            // Collect all form values
            var data = {
                A: $("#A").val(),
                P: $("#P").val(),
                C: $("#C").val(),
                LK: $("#LK").val(),
                WK: $("#WK").val(),
                A_Coef: $("#A_Coef").val(),
                LKG: $("#LKG").val()
            };

            $.ajax({
                url: "/predict",
                type: "POST",
                data: data,
                success: function(response) {
                    console.log(response)
                    $("#result").text("🌾 Predicted Variety: " + response.prediction);
                    $("#result").show();
                },
                error: function() {
                    $("#result").html("❌ Something went wrong!");
                    $("#result").show();
                }
            });
        });
    </script>

</body>
</html>
