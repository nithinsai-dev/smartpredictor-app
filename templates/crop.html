<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .back {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            display: none;
        }
        #resetBtn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            color:white;
        }
        #resetBtn:hover {
            background-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to Home</a>
        <h1>🌱 Crop Recommendation</h1>
        <p>Enter soil and weather conditions to get best crop recommendation</p>

        <div class="form-group">
            <label>Nitrogen (N)</label>
            <input type="number" step="0.01" id="N" placeholder="e.g. 90">
        </div>
        <div class="form-group">
            <label>Phosphorus (P)</label>
            <input type="number" step="0.01" id="P" placeholder="e.g. 42">
        </div>
        <div class="form-group">
            <label>Potassium (K)</label>
            <input type="number" step="0.01" id="K" placeholder="e.g. 43">
        </div>
        <div class="form-group">
            <label>Temperature (°C)</label>
            <input type="number" step="0.01" id="temperature" placeholder="e.g. 20.87">
        </div>
        <div class="form-group">
            <label>Humidity (%)</label>
            <input type="number" step="0.01" id="humidity" placeholder="e.g. 82.00">
        </div>
        <div class="form-group">
            <label>pH Value</label>
            <input type="number" step="0.01" id="ph" placeholder="e.g. 6.50">
        </div>
        <div class="form-group">
            <label>Rainfall (mm)</label>
            <input type="number" step="0.01" id="rainfall" placeholder="e.g. 202.93">
        </div>

        <button id="predictBtn">🌱 Get Crop Recommendation</button>
        <button id="resetBtn" type="button">🔄 Reset</button>
        <div id="result">
            <p class="accuracy">Accuracy : 99%</p>
        </div>

    </div>

    <script>
        $("#predictBtn").click(function() {
            $("#predictBtn").text("⏳ Predicting...").prop("disabled", true);
            var data = {
                N: $("#N").val(),
                P: $("#P").val(),
                K: $("#K").val(),
                temperature: $("#temperature").val(),
                humidity: $("#humidity").val(),
                ph: $("#ph").val(),
                rainfall: $("#rainfall").val()
            };

            $.ajax({
                url: "/predict_crop",
                type: "POST",
                data: data,
                success: function(response) {
                    $("#result").html("✅ Recommended Crop: " + response.prediction);
                    $("#result").show();
                    $("#predictBtn").text("🌱 Get Crop Recommendation").prop("disabled", false);
                },
                error: function() {
                    $("#result").html("❌ Something went wrong!");
                    $("#result").show();
                    $("#predictBtn").text("🌱 Get Crop Recommendation").prop("disabled", false);
                }
            });
        });

        $("#resetBtn").click(function() {
                $("input").val("");
                $("#result").hide();
                $("#predictBtn").prop("disabled", false);
        });
    </script>
</body>
</html>
